<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>PearlHash 快捷入口</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      box-sizing: border-box;
      padding: 24px;
      font-family: "Microsoft YaHei", "Segoe UI", sans-serif;
      background: #111;
      color: #f5f5f5;
    }

    main {
      width: min(920px, 100%);
      margin: 0 auto;
      display: grid;
      gap: 14px;
    }

    h1 {
      margin: 0 0 4px;
      font-size: 26px;
    }

    .actions {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 12px;
    }

    a,
    button {
      min-height: 52px;
      border: 1px solid #444;
      border-radius: 8px;
      background: #1d1d1d;
      color: #fff;
      font: inherit;
      font-size: 17px;
      font-weight: 700;
      text-decoration: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    a:hover,
    button:hover {
      background: #2a2a2a;
      border-color: #777;
    }

    textarea {
      width: 100%;
      min-height: 620px;
      box-sizing: border-box;
      padding: 16px;
      border: 1px solid #444;
      border-radius: 8px;
      background: #050505;
      color: #f5f5f5;
      font-family: Consolas, "Courier New", monospace;
      font-size: 13px;
      line-height: 1.45;
      resize: vertical;
      white-space: pre;
    }

    @media (max-width: 640px) {
      .actions {
        grid-template-columns: 1fr;
      }
    }

    @media (min-width: 641px) and (max-width: 900px) {
      .actions {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }
  </style>
</head>
<body>
  <main>
    <h1>PearlHash 快捷入口</h1>
    <div class="actions">
      <a href="https://inoui.cc/db" target="_blank" rel="noopener noreferrer">打开 inoui.cc/db</a>
      <button type="button" class="copy" data-target="cmd" data-label="复制 P池 CMD 程序">复制 P池 CMD 程序</button>
      <a href="https://pearl.luckypool.io/lpminer/lpminer-0.1.10.zip" target="_blank" rel="noopener noreferrer">下载 Luck lpminer</a>
      <button type="button" class="copy" data-target="luck-cmd" data-label="复制 Luck 池子 CMD">复制 Luck 池子 CMD</button>
    </div>
    <textarea id="cmd" spellcheck="false">@echo off
setlocal EnableExtensions

set "WILDRIG_VERSION=0.48.0"
set "WILDRIG_ZIP=wildrig-multi-windows-%WILDRIG_VERSION%.zip"
set "WILDRIG_URL=https://github.com/andru-kun/wildrig-multi/releases/download/%WILDRIG_VERSION%/%WILDRIG_ZIP%"
set "MINER_DIR=%~dp0wildrig-multi-windows-%WILDRIG_VERSION%"
set "MINER_EXE=%MINER_DIR%\wildrig.exe"

echo PearlHash Windows launcher
echo.

if not exist "%MINER_EXE%" (
    echo Downloading WildRig Multi %WILDRIG_VERSION% for Windows...
    powershell -NoProfile -ExecutionPolicy Bypass -Command ^
        "$ErrorActionPreference='Stop';" ^
        "$zip=Join-Path $env:TEMP '%WILDRIG_ZIP%';" ^
        "Invoke-WebRequest -Uri '%WILDRIG_URL%' -OutFile $zip;" ^
        "if(Test-Path '%MINER_DIR%'){Remove-Item -LiteralPath '%MINER_DIR%' -Recurse -Force};" ^
        "Expand-Archive -LiteralPath $zip -DestinationPath '%MINER_DIR%' -Force"
    if errorlevel 1 (
        echo.
        echo Failed to download or extract WildRig.
        pause
        exit /b 1
    )
)

set "WALLET=prl1puv4zj79afgkqsz09d2nxdmvpkunhc7390w6uu57gscy6rr82y6cqp929te"
if "%WALLET%"=="" (
    echo Wallet address is required.
    pause
    exit /b 1
)

set "WORKER=%COMPUTERNAME%"
set /p "WORKER=Worker name [%WORKER%]: "
if "%WORKER%"=="" set "WORKER=%COMPUTERNAME%"

echo.
echo Select LuckyPool Pearl server:
echo   1. Canada 1     pearl-ca1.luckypool.io:3360
echo   2. Canada 2     pearl-ca2.luckypool.io:3360
echo   3. Europe 1     pearl-eu1.luckypool.io:3360
echo   4. Europe 2     pearl-eu2.luckypool.io:3360
echo   5. Singapore 1  pearl-sg1.luckypool.io:3360
echo   6. Singapore 2  pearl-sg2.luckypool.io:3360
set "REGION=1"
set /p "REGION=Server [1]: "

set "HOST=pearl-ca1.luckypool.io"
if "%REGION%"=="2" set "HOST=pearl-ca2.luckypool.io"
if "%REGION%"=="3" set "HOST=pearl-eu1.luckypool.io"
if "%REGION%"=="4" set "HOST=pearl-eu2.luckypool.io"
if "%REGION%"=="5" set "HOST=pearl-sg1.luckypool.io"
if "%REGION%"=="6" set "HOST=pearl-sg2.luckypool.io"

set "PORT=3360"
set "POOL=%HOST%:%PORT%"

echo.
echo Select tuning profile:
echo   1. Stable      auto intensity, safest
echo   2. Performance intensity 30
echo   3. Aggressive  intensity 31
echo   4. Big test    intensity 32
echo   5. Max test    intensity 33
echo   6. Extreme     intensity 34
echo   7. Custom      type your own WildRig options
set "PROFILE=5"
set /p "PROFILE=Profile [5]: "

set "TUNE_ARGS=--gpu-intensity 33"
if "%PROFILE%"=="1" set "TUNE_ARGS="
if "%PROFILE%"=="2" set "TUNE_ARGS=--gpu-intensity 30"
if "%PROFILE%"=="3" set "TUNE_ARGS=--gpu-intensity 31"
if "%PROFILE%"=="4" set "TUNE_ARGS=--gpu-intensity 32"
if "%PROFILE%"=="6" set "TUNE_ARGS=--gpu-intensity 34"
if "%PROFILE%"=="7" set /p "TUNE_ARGS=Custom options: "

echo.
echo Starting PearlHash mining:
echo   Pool:   %POOL%
echo   Wallet: %WALLET%
echo   Worker: %WORKER%
echo   Tuning: %TUNE_ARGS%
echo.
echo Press Ctrl+C to stop.
echo.

:loop
"%MINER_EXE%" --algo pearlhash --url %POOL% --user %WALLET% --worker %WORKER% %TUNE_ARGS%
echo.
echo Miner stopped. Restarting in 5 seconds...
timeout /t 5 >nul
goto loop</textarea>
    <textarea id="luck-cmd" hidden>@echo off
setlocal EnableExtensions EnableDelayedExpansion

cd /d "%~dp0"

set "POOL=stratum+tcp://pearl-sg1.luckypool.io:3360"
set "WALLET=prl1puv4zj79afgkqsz09d2nxdmvpkunhc7390w6uu57gscy6rr82y6cqp929te"
set "WORKER=rig1"
set "RESTART_DELAY=5"

REM Load a previously-saved wallet, if present.
if exist "wallet.txt" set /p WALLET=<"wallet.txt"

REM Prompt if wallet is empty or still the placeholder.
if "%WALLET%"=="" goto :ask
if "%WALLET%"=="YOUR_WALLET_HERE" goto :ask
goto :run

:ask
echo.
echo  Your PRL wallet is not configured yet.
echo  Paste your wallet address (or 'solo:prl1...' for solo mining):
set /p "WALLET=  > "
if "%WALLET%"=="" (
    echo  No wallet entered. Exiting.
    pause
    exit /b 1
)
> "wallet.txt" echo %WALLET%
echo  Saved to wallet.txt -- delete or edit that file to change wallets.
echo.

:run
:restart
echo [%DATE% %TIME%] starting lpminer (wallet %WALLET%, worker %WORKER%)...
lpminer.exe --algo pearl --pool %POOL% --wallet %WALLET% --worker %WORKER%
set "RC=%ERRORLEVEL%"
echo [%DATE% %TIME%] lpminer exited with code !RC!. Restarting in %RESTART_DELAY% seconds...
timeout /t %RESTART_DELAY% /nobreak >nul
goto restart</textarea>
  </main>

  <script>
    const preview = document.getElementById("cmd");
    const scripts = {
      cmd: preview.value,
      "luck-cmd": document.getElementById("luck-cmd").value,
    };

    const copyText = async (button) => {
      const text = scripts[button.dataset.target];
      preview.value = text;
      preview.select();
      preview.setSelectionRange(0, preview.value.length);
      try {
        await navigator.clipboard.writeText(text);
        button.textContent = "已复制";
      } catch {
        document.execCommand("copy");
        button.textContent = "已复制";
      }
      setTimeout(() => {
        button.textContent = button.dataset.label;
      }, 1600);
    };

    document.querySelectorAll(".copy").forEach((button) => {
      button.addEventListener("click", () => {
        copyText(button);
      });
    });
  </script>
</body>
</html>
